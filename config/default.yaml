# JCoder Configuration
# Storage paths and retrieval settings.
# Model definitions live in models.yaml; ports in ports.yaml.

retrieval:
  top_k: 50
  rerank_top_n: 10
  rrf_k: 60

chunking:
  max_chars: 4000
  strategy: "tree_sitter"

storage:
  data_dir: "data"
  index_dir: "data/indexes"

server:
  timeout_seconds: 120

# Network access policy (enforced by NetworkGate).
# mode: "offline" | "localhost" | "allowlist"
# allowlist: list of allowed hostnames (only used when mode=allowlist)
network:
  mode: "localhost"
  allowlist: []

# Research harvester -- fetches external sources for ingestion.
# Only runs when network.mode == "allowlist" and allowlist is populated.
harvester:
  out_dir: "_harvested"
  cache_dir: ".harvest_cache"
  user_agent: "JCoder-Harvester/1.0"
  timeout_s: 30
  max_bytes: 10000000
  min_interval_s: 1.0
  retries: 2
  backoff_s: 2.0
  github_repos: []
  pypi_packages: []
  hn_queries: []
  arxiv_queries: []

# Evolver -- self-improvement loop (config/prompt tuning only).
evolver:
  seed: 1337
