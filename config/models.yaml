# Model definitions -- names, dimensions, quantization.
#
# Ollama mode (current): uses Ollama model names via OpenAI-compatible API
# vLLM mode: swap to HuggingFace IDs when vLLM stack is running
#   llm.name: "Qwen/Qwen3-Coder-Next-80B"
#   embedder.name: "nomic-ai/nomic-embed-text-v2-moe"
#   reranker.name: "Qwen/Qwen3-Reranker-4B"
# Switched back to phi4: 10x faster than devstral, higher eval scores
# (59% vs 35% overall, 5/5 coding vs 0/5). See evaluation/results_local/model_comparison_2026-03-23.md
# devstral kept as cascade fallback for complex reasoning
llm:
  name: "phi4:14b-q4_K_M"
  quantization: ""
  tensor_parallel: 1
  max_model_len: 32768

# Upgraded to v2-moe: 62% better separation between similar/dissimilar pairs,
# MoE architecture (475M params, 305M active), 100+ programming languages,
# Matryoshka dims (768->256 with minimal loss), 8192 token context.
embedder:
  name: "nomic-embed-text-v2-moe"
  code_model: "nomic-embed-text-v2-moe"
  text_model: "nomic-embed-text-v2-moe"
  dimension: 768
  quantization: ""

reranker:
  name: "Qwen/Qwen3-Reranker-4B"
  quantization: "Q4_K_M"
  enabled: false
