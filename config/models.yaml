# Model definitions -- names, dimensions, quantization.
#
# Ollama mode (current): uses Ollama model names via OpenAI-compatible API
# vLLM mode: swap to HuggingFace IDs when vLLM stack is running
#   llm.name: "Qwen/Qwen3-Coder-Next-80B"
#   embedder.name: "nomic-ai/nomic-embed-code-v1"
#   reranker.name: "Qwen/Qwen3-Reranker-4B"
# Previous: phi4:14b-q4_K_M (good general, weaker on long code)
# Switched to devstral: Mistral's dedicated coding model, 24B params
llm:
  name: "devstral-small-2:24b"
  quantization: ""
  tensor_parallel: 1
  max_model_len: 32768

embedder:
  name: "nomic-embed-text"
  code_model: "nomic-embed-text"
  text_model: "nomic-embed-text"
  dimension: 768
  quantization: ""

reranker:
  name: "Qwen/Qwen3-Reranker-4B"
  quantization: "Q4_K_M"
  enabled: false
