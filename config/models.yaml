# Model definitions -- names, dimensions, quantization.
#
# Ollama mode (current): uses Ollama model names via OpenAI-compatible API
# vLLM mode: swap to HuggingFace IDs when vLLM stack is running
#   llm.name: "Qwen/Qwen3-Coder-Next-80B"
#   embedder.name: "nomic-ai/nomic-embed-code-v1"
#   reranker.name: "Qwen/Qwen3-Reranker-4B"
llm:
  name: "phi4-mini"
  quantization: ""
  tensor_parallel: 1
  max_model_len: 32768

embedder:
  name: "nomic-embed-text"
  dimension: 768
  quantization: ""

reranker:
  name: "Qwen/Qwen3-Reranker-4B"
  quantization: "Q4_K_M"
  enabled: false
