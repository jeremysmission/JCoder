agent:
  backend: openai
  model: "phi4:14b-q4_K_M"
  endpoint: "https://api.openai.com/v1"
  max_iterations: 50
  max_tokens_budget: 500000
  working_dir: "."

  # Ollama defaults (when backend=ollama)
  ollama_endpoint: "http://localhost:11434/v1"
  ollama_model: "phi4:14b-q4_K_M"

  # API defaults (when backend=openai or anthropic)
  # Keys read from environment: OPENAI_API_KEY, ANTHROPIC_API_KEY
  api_model: "anthropic/claude-sonnet-4-20250514"
  api_endpoint: "https://openrouter.ai/api/v1"

  # Persistence paths (relative to repo root or absolute)
  goals_path: "data/agent_goals.json"
  session_dir: "data/agent_sessions"

  safety:
    allowed_dirs: []  # empty = working_dir only
    max_command_timeout_s: 120

  # Self-learning pipeline (Sprint 8)
  self_learning:
    pipeline_enabled: true
    continual_learner_enabled: true
    regression_margin: 0.05
    confidence_gate: 0.2

  # Reasoning modules (Sprint 9)
  reasoning:
    star_enabled: true
    reflection_enabled: true
    best_of_n_enabled: true
    best_of_n_candidates: 3

  # Corrective retrieval and smart orchestrator (Sprint 10)
  corrective:
    corrective_retrieval_enabled: true
    smart_orchestrator_enabled: true
    corrective_confidence_threshold: 0.5
    knowledge_graph_enabled: true

  # Open knowledge fallback (R13) -- answer from LLM knowledge when no indexed sources match
  retrieval:
    open_knowledge_fallback: true
    low_score_threshold: 0.15  # if best chunk < this, use open knowledge

  # Prompt evolution and adversarial hardening (Sprint 11)
  evolution:
    prompt_evolver_enabled: true
    adversarial_self_play_enabled: true
    rapid_digest_enabled: true
    stigmergy_enabled: true

  # Cascade router and model orchestration (Sprint 12)
  cascade:
    cascade_enabled: true

  # Distillation: send weak eval topics to strong model for expert explanations
  distillation:
    enabled: true
    model: "phi4:14b-q4_K_M"
    top: 20
    budget_usd: 2.0
    resume: true
