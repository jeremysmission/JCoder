name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run core tests (fast subset)
        run: |
          python -m pytest tests/test_bridge.py tests/test_cascade.py tests/test_cascade_runner.py tests/test_code_tree.py tests/test_config_loader.py tests/test_config_fallback.py tests/test_concentration_rotation.py tests/test_best_of_n.py tests/test_smart_orchestrator.py tests/test_bridge_cascade_wiring.py tests/test_gui_cli_bridge.py tests/test_meta_cognitive.py tests/test_path_portability_scripts.py tests/test_eval_fn_wiring.py tests/test_retrieval_engine.py tests/test_web_tools.py tests/test_self_learning_pipeline.py tests/test_sanitizer_formats.py tests/test_source_scorer.py tests/test_adversarial_self_play.py tests/test_adversarial_training.py tests/test_ast_fts5_builder.py tests/test_autonomous_research_lab.py tests/test_burst_pipeline.py tests/test_claim_verifier.py tests/test_chunk_determinism.py tests/test_synthesis_matrix.py tests/test_surrogate_scorer.py tests/test_run_download_queue.py tests/test_runtime.py tests/test_weekly_scraper.py tests/test_weekly_subjects.py tests/test_eval_smoke.py tests/test_harness_stress.py -q --timeout=60
        timeout-minutes: 10

      - name: Verify CLI entry point
        run: |
          python -m jcoder --help || python main.py --help
